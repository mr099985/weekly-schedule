<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>週報產生器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --accent: #a78bfa;
    --accent2: #f472b6;
    --text: #e8e8f0;
    --muted: #7070a0;
    --sys: -apple-system, 'Helvetica Neue', Arial, 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--sys);
    background: var(--bg); color: var(--text);
    min-height: 100vh;
    display: grid; grid-template-columns: 380px 1fr;
  }

  /* PANEL */
  .panel {
    background: var(--surface); border-right: 1px solid var(--border);
    height: 100vh; overflow-y: auto;
    padding: 20px 18px 40px;
    display: flex; flex-direction: column; gap: 18px;
  }
  .panel::-webkit-scrollbar { width: 4px; }
  .panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .logo { display: flex; align-items: center; gap: 9px; }
  .logo-dot { width: 26px; height: 26px; border-radius: 7px; flex-shrink: 0;
              background: linear-gradient(135deg,#a78bfa,#f472b6); }
  .logo-text { font-weight: 700; font-size: 14px; letter-spacing: 0.03em; }

  .section { display: flex; flex-direction: column; gap: 9px; }
  .sec-title {
    font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted);
    padding-bottom: 7px; border-bottom: 1px solid var(--border);
  }
  .hint { font-size: 10px; color: var(--muted); margin-top: -4px; }

  input[type=text], select {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 7px;
    color: var(--text); font-family: var(--sys);
    font-size: 12px; padding: 7px 9px; outline: none;
    transition: border-color 0.15s;
  }
  input[type=text]:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }
  input[type=color] {
    width: 34px; height: 32px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 7px;
    padding: 2px 3px; cursor: pointer; flex-shrink: 0;
  }
  .color-row { display: grid; grid-template-columns: 1fr 34px; gap: 5px; align-items: center; }
  .field-label { font-size: 11px; color: var(--muted); margin-bottom: 3px; }

  .seg-group { display: flex; gap: 3px; }
  .seg-btn {
    flex: 1; text-align: center;
    background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
    color: var(--muted); font-family: var(--sys);
    font-size: 11px; font-weight: 600; padding: 6px 3px;
    cursor: pointer; transition: all 0.12s;
  }
  .seg-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .upload-area {
    border: 1.5px dashed var(--border); border-radius: 7px;
    padding: 13px; text-align: center; cursor: pointer;
    font-size: 11px; color: var(--muted); transition: all 0.15s;
  }
  .upload-area:hover { border-color: var(--accent); color: var(--accent); }
  .upload-area.has { border-style: solid; border-color: #4ade80; color: #4ade80; }

  /* day rows */
  .day-rows { display: flex; flex-direction: column; gap: 5px; }
  .day-row {
    display: grid; grid-template-columns: 28px 88px 1fr;
    gap: 5px; align-items: center;
  }
  .day-row.hidden-row > input,
  .day-row.hidden-row input { opacity: 0.25; pointer-events: none; }

  .eye-btn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text);
    width: 28px; height: 28px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; line-height: 1; flex-shrink: 0; transition: all 0.12s;
  }
  .eye-btn:hover { border-color: var(--accent); }
  .eye-btn.off { background: transparent; color: #2a2a3a; border-color: #1c1c28; }

  .tpl-row {
    display: grid; grid-template-columns: 1fr 52px 28px;
    gap: 5px; align-items: center;
  }
  .tpl-name-label {
    font-size: 12px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    padding: 5px 8px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; cursor: default;
  }
  .btn-load {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--accent); font-family: var(--sys);
    font-size: 11px; font-weight: 600; padding: 5px 4px;
    cursor: pointer; transition: all 0.12s; text-align: center;
  }
  .btn-load:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-del {
    background: transparent; border: 1px solid var(--border);
    border-radius: 6px; color: var(--muted);
    width: 28px; height: 28px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; transition: all 0.12s;
  }
  .btn-del:hover { border-color: #f87171; color: #f87171; }
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; color: var(--text); font-family: var(--sys);
    font-size: 12px; padding: 7px 12px; cursor: pointer; transition: all 0.12s; font-weight: 500;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-export {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; color: #fff; font-weight: 700; font-size: 13px;
    padding: 10px 16px; border-radius: 8px; cursor: pointer;
    font-family: var(--sys); width: 100%; transition: opacity 0.12s;
  }
  .btn-export:hover { opacity: 0.82; }

  /* PREVIEW */
  .preview-area {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px; gap: 14px;
    background: repeating-conic-gradient(#1c1c24 0% 25%,#181820 0% 50%) 0 0/22px 22px;
    min-height: 100vh;
  }
  .preview-label {
    font-size: 11px; color: var(--muted);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 9px; padding: 7px 14px;
  }
  #preview-wrap {
    position: relative; overflow: hidden;
    box-shadow: 0 8px 60px rgba(0,0,0,0.55);
    transition: all 0.25s;
  }
  #schedule-canvas { display: block; position: relative; transform-origin: top left; }

  /* CARD */
  .scard {
    width: 100%; height: 100%;
    position: relative; display: flex; overflow: hidden;
    font-family: var(--sys);
  }
  .scard-wm {
    position: absolute; right: -3%; top: 50%;
    transform: translateY(-50%) rotate(90deg);
    font-weight: 900; letter-spacing: 0.15em; text-transform: uppercase;
    opacity: 0.055; white-space: nowrap; pointer-events: none; z-index: 1; color: #fff;
  }
  /* full */
  .scard.mode-full .content-layer {
    position: absolute; inset: 0; z-index: 2;
    display: flex; flex-direction: column; justify-content: center;
  }
  /* half */
  .scard.mode-half .card-img { flex-shrink: 0; background-size: cover; background-position: center; }
  .scard.mode-half .card-color { flex: 1; display: flex; flex-direction: column; justify-content: center; }
  /* solid */
  .scard.mode-solid .card-color {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; justify-content: center;
  }
  .scard-hdr { margin-bottom: 4%; }
  .scard-title { font-weight: 900; line-height: 1.15; }
  .scard-account { font-weight: 400; margin-top: 4px; }
  .scard-row { display: flex; align-items: center; }
  .scard-date { font-weight: 700; flex-shrink: 0; letter-spacing: 0.02em; }
  .scard-evt { font-weight: 400; flex: 1; }

  .scard.mode-full .scard-row {
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-radius: 999px;
  }
  .scard.mode-half .scard-row,
  .scard.mode-solid .scard-row { border-bottom: 1px solid rgba(255,255,255,0.1); }
  .scard.mode-half .scard-row:last-child,
  .scard.mode-solid .scard-row:last-child { border-bottom: none; }
</style>
</head>
<body>

<div class="panel">
  <div class="logo">
    <div class="logo-dot"></div>
    <span class="logo-text">週報產生器</span>
  </div>

  <!-- 基本資訊 -->
  <div class="section">
    <div class="sec-title">基本資訊</div>
    <div>
      <div class="field-label">標題</div>
      <div class="color-row">
        <input type="text" id="title-text" value="週表 WEEKLY PLAN" oninput="st.titleText=this.value;render()">
        <input type="color" id="title-color" value="#ffffff" oninput="st.titleColor=this.value;render()">
      </div>
    </div>
    <div>
      <div class="field-label">帳號（可留空）</div>
      <div class="color-row">
        <input type="text" id="account-text" value="@yourname" oninput="st.accountText=this.value;render()">
        <input type="color" id="account-color" value="#bbbbcc" oninput="st.accountColor=this.value;render()">
      </div>
    </div>
  </div>

  <!-- 尺寸 -->
  <div class="section">
    <div class="sec-title">尺寸</div>
    <div class="seg-group">
      <button class="seg-btn" data-size="169" onclick="setSize('169')">16:9 橫向</button>
      <button class="seg-btn active" data-size="11" onclick="setSize('11')">1:1 方形</button>
      <button class="seg-btn" data-size="45" onclick="setSize('45')">4:5 直向</button>
    </div>
  </div>

  <!-- 背景 -->
  <div class="section">
    <div class="sec-title">背景</div>
    <div class="seg-group">
      <button class="seg-btn active" data-mode="full" onclick="setMode('full')">純圖片</button>
      <button class="seg-btn" data-mode="half" onclick="setMode('half')">½圖＋底色</button>
      <button class="seg-btn" data-mode="solid" onclick="setMode('solid')">純底色</button>
    </div>

    <div id="img-section">
      <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
        ＋ 點擊上傳背景圖片
      </div>
      <input type="file" id="file-input" accept="image/*" style="display:none" onchange="loadImg(event)">
    </div>

    <div id="full-align-section">
      <div class="field-label">內容位置（純圖片模式）</div>
      <div class="seg-group">
        <button class="seg-btn active" data-falign="left"   onclick="setFullAlign('left')">靠左</button>
        <button class="seg-btn"        data-falign="center" onclick="setFullAlign('center')">置中</button>
        <button class="seg-btn"        data-falign="right"  onclick="setFullAlign('right')">靠右</button>
      </div>
    </div>

    <div id="half-side-section" style="display:none">
      <div class="seg-group">
        <button class="seg-btn active" data-side="left" onclick="setSide('left')">圖片在左</button>
        <button class="seg-btn" data-side="right" onclick="setSide('right')">圖片在右</button>
      </div>
    </div>

    <div>
      <div class="field-label">底色（½圖＋底色 / 純底色 模式）</div>
      <input type="color" id="bg-color" value="#1a1a3a" oninput="st.bgColor=this.value;render()" style="width:100%;height:32px;">
    </div>

    <div id="row-bg-section">
      <div class="field-label">事項列底色 ＆ 透明度（純圖片模式）</div>
      <div style="display:grid;grid-template-columns:34px 1fr;gap:5px;align-items:center;">
        <input type="color" id="row-bg-color" value="#ffffff"
               oninput="st.rowBgColor=this.value;render()"
               onchange="st.rowBgColor=this.value;render()">
        <select id="row-bg-opacity" onchange="st.rowBgOpacity=this.value;render()">
          <option value="0.12">透明 12%</option>
          <option value="0.20" selected>20%</option>
          <option value="0.35">35%</option>
          <option value="0.55">55%</option>
          <option value="0.80">80%</option>
          <option value="1.00">不透明</option>
        </select>
      </div>
    </div>

    <div>
      <div class="field-label">事項文字顏色（所有模式）</div>
      <div class="color-row">
        <input type="text" id="row-text-color-hex" value="#ffffff" placeholder="#ffffff"
               oninput="syncRowTextColor(this.value)" maxlength="7">
        <input type="color" id="row-text-color" value="#ffffff"
               oninput="syncRowTextColor(this.value)"
               onchange="syncRowTextColor(this.value)">
      </div>
    </div>
  </div>

  <!-- 日期格式 -->
  <div class="section">
    <div class="sec-title">日期格式</div>
    <div class="seg-group">
      <button class="seg-btn active" data-fmt="dot" onclick="setFmt('dot')">日期數字</button>
      <button class="seg-btn" data-fmt="zh" onclick="setFmt('zh')">週一〜日</button>
      <button class="seg-btn" data-fmt="week" onclick="setFmt('week')">Mon.〜Sun.</button>
    </div>
    <div class="hint">💡 套用後仍可手動修改各行日期文字</div>
  </div>

  <!-- 每週事項 -->
  <div class="section">
    <div class="sec-title">每週事項（固定7天）</div>
    <div class="hint">👁 點眼睛隱藏該天，不顯示在輸出圖中</div>
    <div class="day-rows" id="rows-container"></div>
  </div>

  <!-- 模板 -->
  <div class="section">
    <div class="sec-title">模板</div>
    <div class="hint">圖片不會儲存，其餘設定與事項全部保存</div>
    <div style="display:grid;grid-template-columns:1fr 80px;gap:5px;">
      <input type="text" id="tpl-name" placeholder="模板名稱…" maxlength="20">
      <button class="btn" onclick="saveTpl()" style="white-space:nowrap;">儲存</button>
    </div>
    <div class="day-rows" id="tpl-list" style="gap:4px;"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:2px;">
      <button class="btn" onclick="exportJSON()" title="將所有模板匯出為 JSON 檔案">⬇ 匯出 JSON</button>
      <button class="btn" onclick="document.getElementById('json-import').click()" title="從 JSON 檔案匯入模板">⬆ 匯入 JSON</button>
    </div>
    <input type="file" id="json-import" accept=".json" style="display:none" onchange="importJSON(event)">
  </div>

  <!-- 輸出 -->
  <div class="section">
    <div class="sec-title">輸出</div>
    <button class="btn-export" onclick="exportPNG()">⬇ 匯出 PNG</button>
  </div>
</div>

<!-- PREVIEW -->
<div class="preview-area">
  <div class="preview-label">即時預覽</div>
  <div id="preview-wrap">
    <div id="schedule-canvas"></div>
  </div>
</div>

<script>
// 預覽用尺寸（小，流暢）
const SIZES = { '169':{w:800,h:450}, '11':{w:560,h:560}, '45':{w:480,h:600} };
// 匯出用尺寸（高解析度）
const EXPORT_SIZES = { '169':{w:1920,h:1080}, '11':{w:1080,h:1080}, '45':{w:1080,h:1350} };
const FMTS = {
  dot:  ['01.','02.','03.','04.','05.','06.','07.'],
  zh:   ['週一','週二','週三','週四','週五','週六','週日'],
  week: ['Mon.','Tue.','Wed.','Thu.','Fri.','Sat.','Sun.'],
};
const DAY_NAMES = ['一','二','三','四','五','六','日'];

const st = {
  titleText:'週表 WEEKLY PLAN', titleColor:'#ffffff',
  accountText:'@yourname',      accountColor:'#bbbbcc',
  size:'11', mode:'full', side:'left', fullAlign:'left',
  bgColor:'#1a1a3a', rowBgColor:'#ffffff', rowBgOpacity:'0.20', rowTextColor:'#ffffff',
  fmt:'dot', imageData:null, imageW:0, imageH:0,
  rows: Array.from({length:7}, (_,i) => ({
    date: FMTS.dot[i], event:'', visible:true
  }))
};

function setSize(v){ st.size=v; tog('[data-size]','size',v); render(); }
function setMode(v){
  st.mode=v; tog('[data-mode]','mode',v);
  id('half-side-section').style.display  = v==='half'?'':'none';
  id('full-align-section').style.display = v==='full'?'':'none';
  id('row-bg-section').style.display     = v==='full'?'':'none';
  id('img-section').style.display        = v==='solid'?'none':'';
  render();
}
function setSide(v){ st.side=v; tog('[data-side]','side',v); render(); }
function setFullAlign(v){ st.fullAlign=v; tog('[data-falign]','falign',v); render(); }
function setFmt(v){
  st.fmt=v; tog('[data-fmt]','fmt',v);
  st.rows.forEach((r,i)=>{ r.date=FMTS[v][i]; });
  renderRows(); render();
}
function tog(sel,attr,val){
  document.querySelectorAll(sel).forEach(b=>b.classList.toggle('active',b.dataset[attr]===val));
}
function id(i){ return document.getElementById(i); }

function loadImg(e){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    st.imageData=ev.target.result;
    // 記錄原圖尺寸
    const img=new Image();
    img.onload=()=>{ st.imageW=img.naturalWidth; st.imageH=img.naturalHeight; render(); };
    img.src=ev.target.result;
    const u=id('upload-area');
    u.textContent='✓ '+f.name; u.classList.add('has');
  };
  r.readAsDataURL(f);
}

function renderRows(){
  const c=id('rows-container'); c.innerHTML='';
  st.rows.forEach((r,i)=>{
    const d=document.createElement('div');
    d.className='day-row'+(r.visible?'':' hidden-row');
    d.id='dr'+i;
    d.innerHTML=`
      <button class="eye-btn${r.visible?'':' off'}"
              onclick="toggleRow(${i})"
              title="${r.visible?'隱藏':'顯示'}週${DAY_NAMES[i]}">
        ${r.visible?'👁':'—'}
      </button>
      <input type="text" value="${esc(r.date)}"
             oninput="st.rows[${i}].date=this.value;render()">
      <input type="text" value="${esc(r.event)}"
             placeholder="週${DAY_NAMES[i]}事項（可留空）"
             oninput="st.rows[${i}].event=this.value;render()">
    `;
    c.appendChild(d);
  });
}

function toggleRow(i){
  st.rows[i].visible=!st.rows[i].visible;
  const d=id('dr'+i), vis=st.rows[i].visible;
  d.classList.toggle('hidden-row',!vis);
  const btn=d.querySelector('.eye-btn');
  btn.textContent=vis?'👁':'—';
  btn.classList.toggle('off',!vis);
  btn.title=(vis?'隱藏':'顯示')+'週'+DAY_NAMES[i];
  render();
}

function esc(t){ return (t||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function hexRgb(h){
  const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);
  return r?`${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}`:'255,255,255';
}

function render(){
  const {w,h}=SIZES[st.size];
  const cv=id('schedule-canvas'), wp=id('preview-wrap');

  const maxW=Math.min(window.innerWidth-420,860);
  const maxH=window.innerHeight-100;
  const sc=Math.min(maxW/w, maxH/h, 1);
  wp.style.width=(w*sc)+'px'; wp.style.height=(h*sc)+'px';
  cv.style.width=w+'px'; cv.style.height=h+'px';
  cv.style.transform=`scale(${sc})`;

  const base=Math.min(w,h);
  const fT=Math.round(base*0.057);
  const fA=Math.round(base*0.026);
  const fD=Math.round(base*0.033);
  const fE=Math.round(base*0.031);
  const fW=Math.round(base*0.11);
  const rGap=Math.round(h*0.013);
  const dW=Math.round(w*0.14);
  const rowBg=`rgba(${hexRgb(st.rowBgColor)},${st.rowBgOpacity})`;

  const vis=st.rows.filter(r=>r.visible);
  const hdr=`
    <div class="scard-hdr">
      <div class="scard-title" style="font-size:${fT}px;color:${st.titleColor}">${esc(st.titleText)}</div>
      ${st.accountText?`<div class="scard-account" style="font-size:${fA}px;color:${st.accountColor}">${esc(st.accountText)}</div>`:''}
    </div>`;

  let html='';

  if(st.mode==='full'){
    const bg=st.imageData?`url('${st.imageData}') center/cover no-repeat`:`${st.bgColor}`;
    // 靠左：左5%邊距，右55%留空 → 內容佔40%
    // 靠右：左55%留空，右5%邊距 → 內容佔40%
    // 置中：左右各20%邊距 → 內容佔60%（視覺居中，比左右稍寬）
    const nearPad = Math.round(w * 0.05);
    const farPad  = Math.round(w * 0.55);
    const ctrPad  = Math.round(w * 0.20);
    let layerStyle = '';
    if(st.fullAlign==='left'){
      layerStyle = `padding:6% ${farPad}px 6% ${nearPad}px;`;
    } else if(st.fullAlign==='right'){
      layerStyle = `padding:6% ${nearPad}px 6% ${farPad}px;`;
    } else {
      layerStyle = `padding:6% ${ctrPad}px;align-items:center;text-align:center;`;
    }
    const rowPadV = Math.max(6, Math.round(h * 0.012)); // 約6~8px
    const rows=vis.map(r=>`
      <div class="scard-row" style="background:${rowBg};padding:${rowPadV}px 5%;gap:2%;margin-bottom:${rGap}px;width:100%;justify-content:flex-start;align-items:center">
        <div class="scard-date" style="font-size:${fD}px;color:${st.rowTextColor||'#fff'};flex-shrink:0;line-height:1.2">${esc(r.date)}</div>
        <div class="scard-evt"  style="font-size:${fE}px;color:${st.rowTextColor||'#fff'};flex-shrink:0;line-height:1.2">${esc(r.event)}</div>
      </div>`).join('');
    html=`
      <div class="scard mode-full" style="background:${bg}">
        <div class="scard-wm" style="font-size:${fW}px">SCHEDULE</div>
        <div class="content-layer" style="${layerStyle}">
          ${hdr}${rows}
        </div>
      </div>`;

  } else if(st.mode==='half'){
    const iW=Math.round(w*0.40);
    const iBg=st.imageData?`url('${st.imageData}') center/cover no-repeat`:`linear-gradient(135deg,#555,#222)`;
    const fd=st.side==='right'?'row-reverse':'row';
    const pd=`${Math.round(h*0.06)}px ${Math.round(w*0.05)}px`;
    const rows=vis.map(r=>`
      <div class="scard-row" style="padding:${Math.max(6,Math.round(h*0.012))}px 0;gap:2%;border-bottom:1px solid rgba(255,255,255,0.1);justify-content:flex-start;align-items:center">
        <div class="scard-date" style="font-size:${fD}px;color:${st.rowTextColor||'#fff'};flex-shrink:0;line-height:1.2">${esc(r.date)}</div>
        <div class="scard-evt"  style="font-size:${fE}px;color:${st.rowTextColor||'#fff'};flex-shrink:0;line-height:1.2">${esc(r.event)}</div>
      </div>`).join('');
    html=`
      <div class="scard mode-half" style="flex-direction:${fd}">
        <div class="card-img" style="width:${iW}px;background:${iBg}"></div>
        <div class="card-color" style="background:${st.bgColor};padding:${pd}">
          ${hdr}<div style="margin-top:${Math.round(h*0.02)}px">${rows}</div>
        </div>
      </div>`;

  } else {
    const pd=`${Math.round(h*0.08)}px ${Math.round(w*0.08)}px`;
    const rows=vis.map(r=>`
      <div class="scard-row" style="padding:${Math.max(6,Math.round(h*0.012))}px 0;gap:2%;border-bottom:1px solid rgba(255,255,255,0.1);justify-content:flex-start;align-items:center">
        <div class="scard-date" style="font-size:${fD}px;color:${st.rowTextColor||'#fff'};flex-shrink:0;line-height:1.2">${esc(r.date)}</div>
        <div class="scard-evt"  style="font-size:${fE}px;color:${st.rowTextColor||'#fff'};flex-shrink:0;line-height:1.2">${esc(r.event)}</div>
      </div>`).join('');
    html=`
      <div class="scard mode-solid">
        <div class="scard-wm" style="font-size:${fW}px">SCHEDULE</div>
        <div class="card-color" style="background:${st.bgColor};padding:${pd}">
          ${hdr}<div style="margin-top:${Math.round(h*0.025)}px">${rows}</div>
        </div>
      </div>`;
  }
  cv.innerHTML=html;
}

async function exportPNG(){
  // 固定用高解析度匯出尺寸
  const {w, h} = EXPORT_SIZES[st.size];
  const canvas = document.createElement('canvas');
  const dpr = 1; // 原始尺寸輸出，不放大
  canvas.width  = w * dpr;
  canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  // ── 計算字體大小（與 render() 一致）──
  const base = Math.min(w,h);
  const fT = Math.round(base*0.057);
  const fA = Math.round(base*0.026);
  const fD = Math.round(base*0.033);
  const fE = Math.round(base*0.031);
  const rGap = Math.round(h*0.013);
  const rowPadV = Math.max(6, Math.round(h*0.012));
  const sysFonts = "-apple-system,'Helvetica Neue',Arial,'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif";

  // ── 繪製背景 ──
  const drawBg = () => new Promise(res => {
    if(st.mode === 'solid' || !st.imageData){
      ctx.fillStyle = st.bgColor;
      ctx.fillRect(0,0,w,h);
      res();
    } else {
      const img = new Image();
      img.onload = () => {
        // cover 填滿：等比縮放後置中裁切
        function drawCover(destX, destY, destW, destH){
          const scale = Math.max(destW/img.width, destH/img.height);
          const sw = img.width * scale;
          const sh = img.height * scale;
          const dx = destX + (destW - sw) / 2;
          const dy = destY + (destH - sh) / 2;
          ctx.save();
          ctx.beginPath();
          ctx.rect(destX, destY, destW, destH);
          ctx.clip();
          ctx.drawImage(img, dx, dy, sw, sh);
          ctx.restore();
        }

        if(st.mode === 'full'){
          drawCover(0, 0, w, h);
        } else {
          // half
          const iW = Math.round(w * 0.40);
          if(st.side === 'right'){
            ctx.fillStyle = st.bgColor;
            ctx.fillRect(0, 0, w - iW, h);
            drawCover(w - iW, 0, iW, h);
          } else {
            drawCover(0, 0, iW, h);
            ctx.fillStyle = st.bgColor;
            ctx.fillRect(iW, 0, w - iW, h);
          }
        }
        res();
      };
      img.onerror = () => { ctx.fillStyle=st.bgColor; ctx.fillRect(0,0,w,h); res(); };
      img.src = st.imageData;
    }
  });

  await drawBg();

  // ── 計算內容區域 ──
  let contentX, contentW, contentPadH;
  const nearPad = Math.round(w*0.05);
  const farPad  = Math.round(w*0.55);
  const ctrPad  = Math.round(w*0.20);

  if(st.mode==='full'){
    if(st.fullAlign==='left'){
      contentX=nearPad; contentW=w-nearPad-farPad;
    } else if(st.fullAlign==='right'){
      contentX=farPad; contentW=w-nearPad-farPad;
    } else {
      contentX=ctrPad; contentW=w-ctrPad*2;
    }
    contentPadH = Math.round(h*0.06);
  } else if(st.mode==='half'){
    const iW=Math.round(w*0.40);
    const padH=Math.round(h*0.06), padSide=Math.round(w*0.05);
    if(st.side==='right'){
      contentX=padSide; contentW=w-iW-padSide*2;
    } else {
      contentX=iW+padSide; contentW=w-iW-padSide*2;
    }
    contentPadH=padH;
  } else {
    const pd=Math.round(Math.min(w,h)*0.08);
    contentX=pd; contentW=w-pd*2; contentPadH=pd;
  }

  // ── 標題 & 帳號 ──
  const vis = st.rows.filter(r=>r.visible);
  const hdrH = fT*1.3 + (st.accountText ? fA*1.5 : 0);
  const rowH = fD*1.2 + rowPadV*2;
  const totalH = hdrH + Math.round(h*0.03) + vis.length*(rowH+rGap);
  const startY = (h - totalH) / 2;

  // 標題
  ctx.font = `900 ${fT}px ${sysFonts}`;
  ctx.fillStyle = st.titleColor;
  ctx.textBaseline = 'top';
  ctx.textAlign = st.mode==='full' && st.fullAlign==='center' ? 'center' : 'left';
  const titleX = st.mode==='full' && st.fullAlign==='center' ? w/2 : contentX;
  ctx.fillText(st.titleText, titleX, startY);

  // 帳號
  let curY = startY + fT*1.3;
  if(st.accountText){
    ctx.font = `400 ${fA}px ${sysFonts}`;
    ctx.fillStyle = st.accountColor;
    ctx.fillText(st.accountText, titleX, curY);
    curY += fA*1.5;
  }
  curY += Math.round(h*0.03);

  // ── 事項列 ──
  function hexToRgba(hex, alpha){
    const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    if(!r) return `rgba(255,255,255,${alpha})`;
    return `rgba(${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)},${alpha})`;
  }

  const rowTextColor = st.rowTextColor || '#ffffff';
  const isFullMode = st.mode==='full';

  vis.forEach(r => {
    const rowY = curY;
    const rh = rowH;

    // 圓弧底色（純圖片模式）
    if(isFullMode){
      const radius = rh/2;
      ctx.fillStyle = hexToRgba(st.rowBgColor, parseFloat(st.rowBgOpacity));
      ctx.beginPath();
      ctx.roundRect(contentX, rowY, contentW, rh, radius);
      ctx.fill();
    }

    // 文字
    ctx.fillStyle = rowTextColor;
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'left';
    const textY = rowY + rh/2;
    const textX = isFullMode ? contentX + Math.round(contentW*0.05) : contentX;

    ctx.font = `700 ${fD}px ${sysFonts}`;
    ctx.fillText(r.date, textX, textY);

    const dateWidth = ctx.measureText(r.date).width;
    ctx.font = `400 ${fE}px ${sysFonts}`;
    ctx.fillText(r.event, textX + dateWidth + Math.round(contentW*0.02), textY);

    curY += rh + rGap;
  });

  // ── 下載 ──
  const a = document.createElement('a');
  a.download = 'weekly-schedule.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

// ── TEMPLATES ──
const TPL_KEY = 'weekly-schedule-templates';

function getTpls(){ try{ return JSON.parse(localStorage.getItem(TPL_KEY)||'[]'); }catch{ return []; } }
function setTpls(arr){ localStorage.setItem(TPL_KEY, JSON.stringify(arr)); }

function saveTpl(){
  const nameEl = id('tpl-name');
  const name = nameEl.value.trim() || '未命名模板';
  const snapshot = {
    name,
    titleText:st.titleText, titleColor:st.titleColor,
    accountText:st.accountText, accountColor:st.accountColor,
    size:st.size, mode:st.mode, side:st.side, fullAlign:st.fullAlign,
    bgColor:st.bgColor, rowBgColor:st.rowBgColor, rowBgOpacity:st.rowBgOpacity, rowTextColor:st.rowTextColor||'#ffffff',
    fmt:st.fmt,
    rows: st.rows.map(r=>({...r})),
    savedAt: Date.now()
  };
  const arr = getTpls();
  // 同名覆蓋
  const idx = arr.findIndex(t=>t.name===name);
  if(idx>=0){ arr[idx]=snapshot; } else { arr.push(snapshot); }
  setTpls(arr);
  nameEl.value='';
  renderTplList();
  // 短暫提示
  const btn = nameEl.nextElementSibling;
  btn.textContent='✓ 已存'; btn.style.color='#4ade80';
  setTimeout(()=>{ btn.textContent='儲存'; btn.style.color=''; }, 1200);
}

function loadTpl(idx){
  const arr=getTpls(); const t=arr[idx]; if(!t)return;
  Object.assign(st,{
    titleText:t.titleText, titleColor:t.titleColor,
    accountText:t.accountText, accountColor:t.accountColor,
    size:t.size, mode:t.mode, side:t.side, fullAlign:t.fullAlign||'left',
    bgColor:t.bgColor, rowBgColor:t.rowBgColor, rowBgOpacity:t.rowBgOpacity, rowTextColor:t.rowTextColor||'#ffffff',
    fmt:t.fmt,
    rows:t.rows.map(r=>({...r})),
    imageData: st.imageData // 保留當前已上傳的圖片
  });
  syncUI();
  renderRows();
  render();
}

function deleteTpl(idx){
  const arr=getTpls(); arr.splice(idx,1); setTpls(arr); renderTplList();
}

function renderTplList(){
  const c=id('tpl-list'); c.innerHTML='';
  const arr=getTpls();
  if(!arr.length){
    c.innerHTML='<div style="font-size:11px;color:var(--muted);padding:4px 0;">尚無儲存的模板</div>';
    return;
  }
  arr.forEach((t,i)=>{
    const d=document.createElement('div');
    d.className='tpl-row';
    d.innerHTML=`
      <div class="tpl-name-label" title="${esc(t.name)}">${esc(t.name)}</div>
      <button class="btn-load" onclick="loadTpl(${i})">載入</button>
      <button class="btn-del"  onclick="deleteTpl(${i})" title="刪除">✕</button>
    `;
    c.appendChild(d);
  });
}

function exportJSON(){
  const arr = getTpls();
  if(!arr.length){ alert('尚無儲存的模板，請先儲存至少一個模板。'); return; }
  const blob = new Blob([JSON.stringify(arr, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'weekly-schedule-templates.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function importJSON(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try{
      const data = JSON.parse(ev.target.result);
      if(!Array.isArray(data)) throw new Error('格式錯誤');
      // 驗證每筆資料有基本欄位
      data.forEach((t,i)=>{
        if(!t.name || !Array.isArray(t.rows)) throw new Error(`第 ${i+1} 筆資料格式不正確`);
      });
      const existing = getTpls();
      // 同名覆蓋，新的追加
      data.forEach(t=>{
        const idx = existing.findIndex(e=>e.name===t.name);
        if(idx>=0) existing[idx]=t; else existing.push(t);
      });
      setTpls(existing);
      renderTplList();
      // 重置 input 讓同一檔案可再次匯入
      e.target.value='';
      // 提示
      alert(`✓ 匯入完成！共載入 ${data.length} 個模板。`);
    }catch(err){
      alert('匯入失敗：' + err.message);
      e.target.value='';
    }
  };
  reader.readAsText(file);
}

function syncRowTextColor(val){
  // 補上 # 前綴
  const v = val.startsWith('#') ? val : '#'+val;
  st.rowTextColor = v;
  // 同步兩個欄位
  const hexEl = document.getElementById('row-text-color-hex');
  const picEl = document.getElementById('row-text-color');
  if(hexEl) hexEl.value = v;
  if(picEl && /^#[0-9a-fA-F]{6}$/.test(v)) picEl.value = v;
  render();
}

function syncUI(){
  // text inputs
  id('title-text').value   = st.titleText;
  id('title-color').value  = st.titleColor;
  id('account-text').value = st.accountText;
  id('account-color').value= st.accountColor;
  id('row-text-color').value     = st.rowTextColor||'#ffffff';
  id('row-text-color-hex').value = st.rowTextColor||'#ffffff';
  id('bg-color').value     = st.bgColor;
  id('row-bg-color').value = st.rowBgColor;
  id('row-bg-opacity').value = st.rowBgOpacity;
  // seg buttons
  tog('[data-size]','size',st.size);
  tog('[data-mode]','mode',st.mode);
  tog('[data-side]','side',st.side);
  tog('[data-falign]','falign',st.fullAlign);
  tog('[data-fmt]','fmt',st.fmt);
  // section visibility
  id('half-side-section').style.display  = st.mode==='half'?'':'none';
  id('full-align-section').style.display = st.mode==='full'?'':'none';
  id('row-bg-section').style.display     = st.mode==='full'?'':'none';
  id('img-section').style.display        = st.mode==='solid'?'none':'';
}

renderRows();
renderTplList();
render();
</script>
